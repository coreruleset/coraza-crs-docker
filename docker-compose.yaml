---

# Docker compose example for the Coraza WAF
# Use profiles to select which WAF variant(s) to run.
#
# Usage:
#   docker compose --profile caddy up         # starts caddy + whoami
#   docker compose --profile nginx up         # starts nginx + whoami
#   docker compose --profile apache up        # starts apache + whoami
#   docker compose --profile all up           # starts all three + whoami

services:

  ## The "whoami" container
  ## This is the container that the WAF will be protecting
  whoami:
    image: traefik/whoami
    networks:
      - waf

  ## Coraza WAF running on Caddy
  coraza-caddy:
    profiles: ["caddy", "all"]
    build:
      context: .
      dockerfile: caddy/Dockerfile
      args:
        # renovate: depName=coreruleset/coreruleset datasource=github-releases
        CRS_VERSION: "4.25.0"
        # renovate: depName=caddy datasource=docker
        CADDY_VERSION: "2.11.2"
        # renovate: depName=corazawaf/coraza-caddy datasource=github-releases
        CORAZA_VERSION: "v2.2.0"
    depends_on:
      - whoami
    networks:
      - waf
    ports:
      - "8080:8080"
    environment:
      - BACKEND=whoami:80
      - CORAZA_RULE_ENGINE=On

  ## Coraza WAF running on nginx
  coraza-nginx:
    profiles: ["nginx", "all"]
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        # renovate: depName=coreruleset/coreruleset datasource=github-releases
        CRS_VERSION: "4.25.0"
        # renovate: depName=golang datasource=docker
        GOLANG_VERSION: "1.25"
        # renovate: depName=corazawaf/libcoraza datasource=github-releases
        LIBCORAZA_VERSION: "v1.2.0"
        # renovate: depName=corazawaf/coraza-nginx datasource=github-releases
        CORAZA_NGINX_VERSION: "0.10.1"
        # renovate: depName=nginxinc/nginx-unprivileged datasource=docker
        NGINX_VERSION: "1.28.2"
    depends_on:
      - whoami
    networks:
      - waf
    ports:
      - "8081:8080"
    environment:
      - BACKEND=whoami:80
      - CORAZA_RULE_ENGINE=On

  ## Coraza WAF running on Apache
  coraza-apache:
    profiles: ["apache", "all"]
    build:
      context: .
      dockerfile: apache/Dockerfile
      args:
        # renovate: depName=coreruleset/coreruleset datasource=github-releases
        CRS_VERSION: "4.25.0"
        # renovate: depName=golang datasource=docker
        GOLANG_VERSION: "1.25"
        # renovate: depName=corazawaf/libcoraza datasource=github-releases
        LIBCORAZA_VERSION: "v1.2.0"
        # renovate: depName=corazawaf/coraza-apache datasource=github-releases
        CORAZA_APACHE_VERSION: "0.0.1"
        # renovate: depName=httpd datasource=docker
        HTTPD_VERSION: "2.4"
    depends_on:
      - whoami
    networks:
      - waf
    ports:
      - "8082:8080"
    environment:
      - BACKEND=whoami:80
      - CORAZA_RULE_ENGINE=On

## Networks used by the above services
networks:
  waf:
