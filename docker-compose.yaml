---

# Docker compose example for the Coraza WAF
# Three profiles are available: caddy (default), nginx, and apache.
#
# Usage:
#   docker compose up                          # starts caddy + whoami
#   docker compose --profile nginx up          # starts nginx + whoami
#   docker compose --profile apache up         # starts apache + whoami
#   docker compose --profile all up            # starts all three + whoami

services:

  ## The "whoami" container
  ## This is the container that the WAF will be protecting
  whoami:
    image: traefik/whoami
    networks:
      - waf

  ## Coraza WAF running on Caddy
  coraza-caddy:
    image: ghcr.io/coreruleset/coraza-crs:caddy-alpine
    depends_on:
      - whoami
    networks:
      - waf
    ports:
      - "8080:8080"
    environment:
      - BACKEND=whoami:80
      - CORAZA_RULE_ENGINE=On

  ## Coraza WAF running on nginx
  coraza-nginx:
    profiles: ["nginx", "all"]
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        CRS_VERSION: "4.24.1"
    depends_on:
      - whoami
    networks:
      - waf
    ports:
      - "8081:80"
    environment:
      - BACKEND=whoami:80
      - CORAZA_RULE_ENGINE=On

  ## Coraza WAF running on Apache
  coraza-apache:
    profiles: ["apache", "all"]
    build:
      context: .
      dockerfile: apache/Dockerfile
      args:
        CRS_VERSION: "4.24.1"
    depends_on:
      - whoami
    networks:
      - waf
    ports:
      - "8082:80"
    environment:
      - BACKEND=whoami:80
      - CORAZA_RULE_ENGINE=On

## Networks used by the above services
networks:
  waf:
