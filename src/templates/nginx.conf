load_module "/usr/lib/nginx/modules/ngx_http_coraza_module.so";

worker_processes auto;

error_log ${ERRORLOG} ${LOGLEVEL};
pid /tmp/nginx.pid;

events {
    worker_connections ${WORKER_CONNECTIONS};
}

http {
    server_tokens ${SERVER_TOKENS};
    keepalive_timeout ${KEEPALIVE_TIMEOUT};

    coraza on;
    coraza_rules_file /opt/coraza/config/coraza-rules.conf;

    access_log ${ACCESSLOG};

    # Real IP (when behind a load balancer / reverse proxy)
    set_real_ip_from ${SET_REAL_IP_FROM};
    real_ip_header ${REAL_IP_HEADER};
    real_ip_recursive ${REAL_IP_RECURSIVE};

    upstream backend {
        server ${BACKEND};
    }

    server {
        listen ${PORT} default_server;
        server_name ${SERVER_NAME};
        http2 ${HTTP2};

        set $always_redirect ${ALWAYS_TLS_REDIRECT};

        location / {
            if ($always_redirect = on) {
                return 301 https://$host:${SSL_PORT}$request_uri;
            }

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout ${PROXY_TIMEOUT};
            proxy_send_timeout ${PROXY_TIMEOUT};
            proxy_read_timeout ${PROXY_TIMEOUT};
        }
    }

    server {
        listen ${SSL_PORT} ssl;
        server_name ${SERVER_NAME};
        http2 ${HTTP2};

        ssl_certificate ${SSL_CERT_FILE};
        ssl_certificate_key ${SSL_CERT_KEY_FILE};
        ssl_protocols ${SSL_PROTOCOLS};
        ssl_ciphers ${SSL_CIPHERS};
        ssl_prefer_server_ciphers ${SSL_PREFER_CIPHERS};
        ssl_session_timeout 1d;
        ssl_session_cache shared:MozSSL:10m;
        ssl_session_tickets off;
        ssl_dhparam /etc/ssl/certs/dhparam-${SSL_DH_BITS}.pem;
        ssl_stapling ${SSL_OCSP_STAPLING};

        ssl_verify_client ${SSL_VERIFY};
        ssl_verify_depth ${SSL_VERIFY_DEPTH};

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout ${PROXY_TIMEOUT};
            proxy_send_timeout ${PROXY_TIMEOUT};
            proxy_read_timeout ${PROXY_TIMEOUT};
        }
    }
}
